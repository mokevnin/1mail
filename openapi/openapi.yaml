security:
  - BearerAuth: []
components:
  schemas:
    Broadcast:
      type: object
      required:
        - id
        - name
        - segmentId
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        name:
          type: string
          description: Broadcast name
        segmentId:
          type: integer
          format: int64
          description: Segment ID
        status:
          allOf:
            - $ref: '#/components/schemas/BroadcastStatus'
          description: Broadcast status
        createdAt:
          type: string
          description: Creation timestamp (ISO 8601)
        updatedAt:
          type: string
          description: Last update timestamp (ISO 8601)
      description: Broadcast resource
      example:
        id: 501
        name: April product update
        segmentId: 301
        status: draft
        createdAt: '2026-04-02T08:00:00Z'
        updatedAt: '2026-04-04T16:30:00Z'
    BroadcastPage:
      type: object
      required:
        - content
        - totalElements
        - totalPages
        - size
        - number
        - numberOfElements
        - first
        - last
        - empty
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Broadcast'
          description: List of broadcasts
        pageable:
          allOf:
            - $ref: '#/components/schemas/Pageable'
          description: Paging information
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          format: int32
          description: Total number of pages
        size:
          type: integer
          format: int32
          description: Page size
        number:
          type: integer
          format: int32
          description: Page number (0-based)
        numberOfElements:
          type: integer
          format: int32
          description: Number of elements in current page
        first:
          type: boolean
          description: Whether this is the first page
        last:
          type: boolean
          description: Whether this is the last page
        empty:
          type: boolean
          description: Whether content is empty
        sort:
          allOf:
            - $ref: '#/components/schemas/Sort'
          description: Sorting information
      description: Spring Data paginated response
      example:
        content:
          - id: 501
            name: April product update
            segmentId: 301
            status: draft
            createdAt: '2026-04-02T08:00:00Z'
            updatedAt: '2026-04-04T16:30:00Z'
        pageable:
          pageSize: 25
          pageNumber: 0
          offset: 0
          paged: true
          unpaged: false
          sort:
            sorted: true
            unsorted: false
            empty: false
        totalElements: 1
        totalPages: 1
        size: 25
        number: 0
        numberOfElements: 1
        first: true
        last: true
        empty: false
        sort:
          sorted: true
          unsorted: false
          empty: false
    BroadcastStatus:
      type: string
      enum:
        - draft
        - scheduled
        - sent
      description: Broadcast status
    ContactPageResponse:
      type: object
      required:
        - content
        - totalElements
        - totalPages
        - size
        - number
        - numberOfElements
        - first
        - last
        - empty
