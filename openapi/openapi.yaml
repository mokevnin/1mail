security:
  - BearerAuth: []
components:
  parameters:
    PageQuery.page:
      name: page
      in: query
      required: false
      description: Page number (0-based)
      schema:
        type: integer
        format: int32
        default: 0
      explode: false
    PageQuery.size:
      name: size
      in: query
      required: false
      description: Page size
      schema:
        type: integer
        format: int32
        default: 25
      explode: false
    PageQuery.sort:
      name: sort
      in: query
      required: false
      description: Sorting criteria (e.g. name,asc). Can be repeated.
      schema:
        type: array
        items:
          type: string
      explode: false
  schemas:
    BroadcastPage:
      type: object
      required:
        - content
        - totalElements
        - totalPages
        - size
        - number
        - numberOfElements
        - first
        - last
        - empty
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BroadcastResource'
          description: List of items
        pageable:
          allOf:
            - $ref: '#/components/schemas/Pageable'
          description: Paging information
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          format: int32
          description: Total number of pages
        size:
          type: integer
          format: int32
          description: Page size
        number:
          type: integer
          format: int32
          description: Page number (0-based)
        numberOfElements:
          type: integer
          format: int32
          description: Number of elements in current page
        first:
          type: boolean
          description: Whether this is the first page
        last:
          type: boolean
          description: Whether this is the last page
        empty:
          type: boolean
          description: Whether content is empty
        sort:
          allOf:
            - $ref: '#/components/schemas/Sort'
          description: Sorting information
      description: Spring Data paginated response
    BroadcastResource:
      type: object
      required:
        - id
        - name
        - segmentId
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        name:
          type: string
          description: Broadcast name
        segmentId:
          type: integer
          format: int64
          description: Segment ID
        status:
          allOf:
            - $ref: '#/components/schemas/BroadcastStatus'
          description: Broadcast status
        createdAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: Creation timestamp
        updatedAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: Last update timestamp
      description: Broadcast resource
    BroadcastStatus:
      type: string
      enum:
        - draft
        - scheduled
        - sent
      description: Broadcast status
    ContactPage:
      type: object
      required:
        - content
        - totalElements
        - totalPages
        - size
        - number
        - numberOfElements
        - first
        - last
        - empty
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ContactResource'
          description: List of items
        pageable:
          allOf:
            - $ref: '#/components/schemas/Pageable'
          description: Paging information
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          format: int32
          description: Total number of pages
        size:
          type: integer
          format: int32
          description: Page size
        number:
          type: integer
          format: int32
          description: Page number (0-based)
        numberOfElements:
          type: integer
          format: int32
          description: Number of elements in current page
        first:
          type: boolean
          description: Whether this is the first page
        last:
          type: boolean
          description: Whether this is the last page
        empty:
          type: boolean
          description: Whether content is empty
        sort:
          allOf:
            - $ref: '#/components/schemas/Sort'
          description: Sorting information
      description: Spring Data paginated response
    ContactResource:
      type: object
      required:
        - id
        - email
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        email:
          allOf:
            - $ref: '#/components/schemas/EmailAddress'
          description: Email address
        firstName:
          type: string
          description: First name
        lastName:
          type: string
          description: Last name
        status:
