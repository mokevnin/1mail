                        createdAt: '2026-04-02T08:00:00Z'
                        updatedAt: '2026-04-04T16:30:00Z'
                    pageable:
                      pageSize: 25
                      pageNumber: 0
                      offset: 0
                      paged: true
                      unpaged: false
                      sort:
